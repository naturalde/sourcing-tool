version: '3.8'

services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/sourcing
      - REDIS_URL=redis://redis:6379
      - TAOBAO_SERVICE_URL=http://taobao-service:8000
      - SERVICE_1688_URL=http://1688-service:8000
      - TEMU_SERVICE_URL=http://temu-service:8000
      - AMAZON_SERVICE_URL=http://amazon-service:8000
      - TREND_SERVICE_URL=http://trend-service:8000
      - NODE_ENV=development
    depends_on:
      - postgres
      - redis
      - taobao-service
      - trend-service
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  taobao-service:
    build:
      context: ./services/taobao
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ONEBOUND_API_KEY=${ONEBOUND_API_KEY}
    depends_on:
      - redis

  trend-service:
    build:
      context: ./services/trends
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sourcing
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
